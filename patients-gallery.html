<!DOCTYPE html>

<title>Our Happy Patients</title>

<style>

body{
  font-family: Arial;
  background:#f5f5f5;
  padding:40px;
}

.gallery-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.gallery-grid img{
  width:100%;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
}

.gallery-grid img:hover{
  transform:scale(1.05);
}

</style>

</head>
<body>

<h2>Our Happy Patients</h2>

</body>
</html>
